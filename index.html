<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dating with me~</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff6f91;
    --pink-light: #ffe7ef;
    --pink-dark: #d9416a;
    --cream: #fff7df;
    --mint: #b7eadb;
    --ink: #33282d;
    --bg: #fff5f0;
    --card-bg: rgba(255,255,255,0.88);
    --text: #33282d;
    --text-light: #8d747d;
    --radius: 26px;
    --radius-sm: 16px;
    --shadow: 0 24px 70px rgba(217, 65, 106, 0.16);
  }

  html, body {
    height: 100%;
    /* Prevent iOS overscroll bounce */
    overscroll-behavior: none;
    -webkit-overflow-scrolling: auto;
  }

  body {
    font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background:
      radial-gradient(circle at 12% 18%, rgba(255,111,145,0.28), transparent 28vw),
      radial-gradient(circle at 86% 16%, rgba(183,234,219,0.5), transparent 24vw),
      linear-gradient(135deg, #fff8e8 0%, #ffe8ed 48%, #f8fff8 100%);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh; /* iOS Safari fix */
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.28;
    background-image:
      linear-gradient(rgba(51,40,45,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(51,40,45,0.08) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: linear-gradient(to bottom, transparent, #000 14%, #000 84%, transparent);
  }

  body::after {
    content: "DATE?";
    position: fixed;
    right: clamp(18px, 6vw, 78px);
    bottom: clamp(18px, 5vw, 70px);
    color: rgba(217,65,106,0.11);
    font-size: clamp(56px, 12vw, 160px);
    font-weight: 900;
    letter-spacing: 0;
    pointer-events: none;
  }

  /* ── Phone frame (desktop) ── */
  .phone {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    height: 100dvh;
    background:
      radial-gradient(circle at 50% -10%, rgba(255,255,255,0.9), transparent 42%),
      linear-gradient(180deg, #fffaf1 0%, #fff0f5 100%);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
  }
  @media (min-width: 768px) {
    .phone {
      width: min(420px, calc(100vw - 48px));
      height: min(820px, 88vh);
      border-radius: 42px;
      border: 10px solid #241d20;
      box-shadow:
        0 34px 90px rgba(72,31,45,0.24),
        inset 0 0 0 1px rgba(255,255,255,0.42);
    }
    .phone::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      width: 118px;
      height: 24px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: #241d20;
      z-index: 5;
      opacity: 0.96;
    }
  }

  /* ── Pages ── */
  .page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 34px 24px;
    padding-bottom: max(32px, env(safe-area-inset-bottom));
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
    will-change: transform, opacity;
  }
  .page--enter { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .page--active { transform: translateX(0); opacity: 1; }
  .page--exit  { transform: translateX(-100%); opacity: 0; pointer-events: none; }

  /* ── Decorative blossoms ── */
  .blossom {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    filter: drop-shadow(0 8px 10px rgba(217,65,106,0.16));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-8px) rotate(5deg); }
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.72);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    padding: 34px 26px 30px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px dashed rgba(217,65,106,0.24);
    border-radius: calc(var(--radius) - 10px);
    pointer-events: none;
  }

  /* ── Avatar ── */
  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 20px;
  }
  .avatar {
    width: 102px;
    height: 102px;
    border-radius: 30px;
    border: 4px solid #fff;
    box-shadow: 0 12px 24px rgba(217,65,106,0.2), 0 0 0 3px var(--pink);
    object-fit: cover;
    display: block;
  }
  .blossom-avatar {
    position: absolute;
    top: -14px;
    right: -10px;
    font-size: 24px;
  }

  /* ── Typography ── */
  h1 {
    font-size: 28px;
    font-weight: 850;
    line-height: 1.28;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: 0;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 14px;
    width: 100%;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    padding: 14px 0;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s, left 0.24s cubic-bezier(.2,.8,.2,1), top 0.24s cubic-bezier(.2,.8,.2,1);
    -webkit-tap-highlight-color: transparent;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { transform: scale(0.96); }

  .btn--yes {
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: #fff;
    box-shadow: 0 12px 24px rgba(217,65,106,0.28);
  }
  .btn--no {
    background: rgba(255,255,255,0.9);
    color: var(--text);
    border: 1.5px solid rgba(51,40,45,0.14);
    box-shadow: 0 8px 20px rgba(51,40,45,0.08);
  }
  .btn--no.is-running-away {
    position: fixed;
    z-index: 120;
    width: 138px;
    flex: none;
    box-shadow: 0 22px 46px rgba(217,65,106,0.28);
  }
  .btn--no.is-flashing {
    animation: noPulse 0.42s ease-in-out;
  }
  @keyframes noPulse {
    0%, 100% {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      filter: saturate(1);
    }
    45% {
      opacity: 0.28;
      transform: scale(0.86) rotate(-4deg);
      filter: saturate(1.5);
    }
    62% {
      opacity: 1;
      transform: scale(1.08) rotate(3deg);
    }
  }
  .btn--full {
    width: 100%;
    margin-top: 18px;
  }

  /* ── Calendar ── */
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .cal-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .cal-arrows { display: flex; gap: 6px; }
  .cal-arrow {
    width: 32px; height: 32px;
    border-radius: 12px;
    border: 1px solid rgba(51,40,45,0.12);
    background: rgba(255,255,255,0.76);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
    margin-bottom: 14px;
  }
  .cal-day-label {
    font-size: 12px;
    color: var(--text-light);
    padding: 6px 0;
    font-weight: 500;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 12px;
    border: none;
    background: transparent;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-day:active { transform: scale(0.92); }
  .cal-day--other { color: #ccc; }
  .cal-day--today { border: 2px solid var(--pink); }
  .cal-day--selected {
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: #fff;
    font-weight: 700;
  }
  .cal-day--disabled {
    color: #ddd;
    cursor: not-allowed;
  }

  .selected-date-display {
    font-size: 15px;
    color: var(--pink-dark);
    font-weight: 600;
    margin-bottom: 18px;
  }

  /* ── Food grid ── */
  .food-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 10px;
  }
  @media (min-width: 380px) {
    .food-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 640px) {
    .food-grid { grid-template-columns: repeat(5, 1fr); }
  }
  .food-btn {
    padding: 12px 8px;
    border-radius: 18px;
    border: 1.5px solid rgba(51,40,45,0.12);
    background: rgba(255,255,255,0.82);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    -webkit-tap-highlight-color: transparent;
  }
  .food-btn:active { transform: scale(0.94); }
  .food-btn--selected {
    border-color: var(--pink);
    background: linear-gradient(180deg, #fff, var(--pink-light));
    font-weight: 600;
  }
  .food-emoji { font-size: 28px; }

  /* ── Extras textarea ── */
  .extras {
    width: 100%;
    margin-top: 10px;
  }
  .extras textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 18px;
    border: 1.5px solid rgba(51,40,45,0.12);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .extras textarea:focus { border-color: var(--pink); }

  /* ── Fade-in animation ── */
  .fade-in {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeIn 0.5s 0.1s forwards;
  }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Toast / confetti ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(51,40,45,0.92);
    color: #fff;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 99;
  }
  .toast--show { opacity: 1; }

  /* ── Page progress dots ── */
  .dots {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 2;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ddd;
    transition: background 0.3s;
  }
  .dot--active { background: var(--pink); }

  .no-copy {
    position: fixed;
    left: 50%;
    top: 50%;
    width: min(520px, calc(100vw - 36px));
    transform: translate(-50%, -50%) scale(0.94);
    border: 1px solid rgba(255,255,255,0.78);
    border-radius: 28px;
    padding: 24px 26px;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 30px 80px rgba(51,40,45,0.22);
    color: var(--ink);
    text-align: center;
    font-size: clamp(20px, 3vw, 36px);
    font-weight: 850;
    line-height: 1.35;
    z-index: 110;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.26s ease, transform 0.26s ease;
  }
  .no-copy--show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .yes-dialog {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: grid;
    place-items: center;
    padding: 28px;
    background: rgba(51,40,45,0.22);
    backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
  }
  .yes-dialog--show {
    opacity: 1;
    pointer-events: auto;
  }
  .yes-dialog__panel {
    width: 100%;
    max-width: 330px;
    padding: 28px 24px 24px;
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 28px;
    background: rgba(255,255,255,0.94);
    box-shadow: 0 28px 70px rgba(51,40,45,0.24);
    text-align: center;
    transform: translateY(12px) scale(0.96);
    transition: transform 0.22s ease;
  }
  .yes-dialog--show .yes-dialog__panel {
    transform: translateY(0) scale(1);
  }
  .yes-dialog__emoji {
    font-size: 42px;
    margin-bottom: 12px;
  }
  .yes-dialog__title {
    font-size: 24px;
    font-weight: 850;
    line-height: 1.32;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .yes-dialog__small {
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.6;
    margin-bottom: 22px;
  }

  @media (max-width: 767px) {
    body {
      background: linear-gradient(180deg, #fff7df 0%, #fff0f5 100%);
    }
    body::before,
    body::after {
      display: none;
    }
    .page {
      justify-content: flex-start;
      padding-top: max(42px, env(safe-area-inset-top));
    }
    .card {
      margin-top: 7vh;
      max-width: 100%;
      box-shadow: 0 18px 44px rgba(217,65,106,0.12);
    }
    h1 {
      font-size: 30px;
    }
    .dots {
      bottom: max(22px, env(safe-area-inset-bottom));
    }
  }

  @media (min-width: 900px) {
    .page {
      padding-inline: 28px;
    }
    .card {
      transform: rotate(-1deg);
    }
    .page[data-page="1"] .card,
    .page[data-page="2"] .card {
      transform: none;
    }
  }
</style>
</head>

      <p class="subtitle">挑一个今天的约会氛围。</p>

      <div class="food-grid" id="foodGrid"></div>
      <div class="extras">
        <textarea rows="2" id="noteInput" placeholder="还想说点什么？(选填)"></textarea>
      </div>

      <div class="btn-row">
        <button class="btn btn--yes btn--full" onclick="handleSubmit()" id="btnSubmit">
          确定啦 💌
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════ Dots ═══════════ -->
  <div class="dots" id="dots">
    <div class="dot dot--active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- ═══════════ Toast ═══════════ -->
  <div class="yes-dialog" id="yesDialog" aria-hidden="true">
    <div class="yes-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="yesDialogTitle">
      <div class="yes-dialog__emoji">😭</div>
      <div class="yes-dialog__title" id="yesDialogTitle">等下，<br>你真的点了愿意？？</div>
      <div class="yes-dialog__small">我都准备好被你点不要了</div>
      <button class="btn btn--yes btn--full" onclick="confirmYesDialog()">好啦好啦&nbsp;→</button>
    </div>
  </div>

  <!-- ═══════════ Toast ═══════════ -->
  <div class="toast" id="toast"></div>

</div>

<script>
// ╔══════════════════════════════════════════╗
// ║  ★★★ 你需要替换的配置 ★★★            ║
// ╚══════════════════════════════════════════╝

// ── 微信通知：Server酱 ──
// 1. 打开 https://sct.ftqq.com/ 微信扫码登录
// 2. 点击「发送消息」→ 复制 SendKey（SCT开头的字符串）
// 3. 粘贴到下面：
const SCKEY = "SCT378296Tyvb77qcN40sSMDfvpNRyFCGL";

// ── 邮件通知：EmailJS ──
// 1. 打开 https://www.emailjs.com/ 注册（免费 200封/月）
// 2. 创建 Email Service（选 Gmail / Outlook 等）
// 3. 创建 Email Template，变量用 {{date}} {{food}} {{note}}
// 4. 复制你的 public key / service ID / template ID：
const EMAILJS_PUBLIC_KEY = "__EMAILJS_PUBLIC_KEY__";
const EMAILJS_SERVICE_ID = "__EMAILJS_SERVICE_ID__";
const EMAILJS_TEMPLATE_ID = "__EMAILJS_TEMPLATE_ID__";

// ── 个性化 ──
const MY_NAME   = "我";   // 改成你的名字，会出现在通知里


// ╔══════════════════════════════════════════╗
// ║  APP STATE                             ║
// ╚══════════════════════════════════════════╝
const now        = new Date();
const todayYear  = now.getFullYear();
const todayMonth = now.getMonth();
const todayDay   = now.getDate();

let currentPage = 0;
let selectedDate = null; // { year, month, day, label }
let selectedFood = null;
let calYear  = todayYear;
let calMonth = todayMonth;

const foods = [
  { emoji: "🥩", label: "牛排" },
  { emoji: "🍣", label: "日料" },
  { emoji: "🥘", label: "火锅" },
  { emoji: "🔥", label: "烤肉" },
  { emoji: "🥟", label: "粤菜" },
  { emoji: "🍢", label: "烧鸟" },
  { emoji: "🍿", label: "其他" },
];


// ╔══════════════════════════════════════════╗
// ║  PAGE NAVIGATION                       ║
// ╚══════════════════════════════════════════╝
function showYesDialog() {
  const dialog = document.getElementById("yesDialog");
  if (!dialog) return;
  dialog.classList.add("yes-dialog--show");
  dialog.setAttribute("aria-hidden", "false");
}

function confirmYesDialog() {
  const dialog = document.getElementById("yesDialog");
  if (dialog) {
    dialog.classList.remove("yes-dialog--show");
    dialog.setAttribute("aria-hidden", "true");
  }
  goPage(1);
}

function goPage(n) {
  if (n === 1 && !selectedDate && currentPage === 0) {
    // Allow going to page 1 (date picker) from page 0
    // selectedDate not required yet
  }
  if (n !== 0) restoreNoButtonHome(document.querySelector(".btn--no"));
  animatePages(currentPage, n);
  currentPage = n;
  updateDots();
  if (n === 1) renderCalendar();
  if (n === 2) renderFoodGrid();
}

function animatePages(from, to) {
  const pages = document.querySelectorAll(".page");
  const dots  = document.getElementById("dots");
  const dir   = to > from ? 1 : -1;

  pages.forEach(p => {
    const idx = Number(p.dataset.page);
    if (idx === from) p.className = `page page--exit`;
    if (idx === to)   p.className = `page page--active fade-in`;
    if (idx !== from && idx !== to) p.className = `page page--enter`;
  });
  dots.className = "dots"; // keep dots visible
}

function updateDots() {
  document.querySelectorAll(".dot").forEach((d, i) => {
    d.classList.toggle("dot--active", i === currentPage);
  });
}


// ╔══════════════════════════════════════════╗
// ║  CALENDAR                              ║
// ╚══════════════════════════════════════════╝
function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const label = document.getElementById("calMonthLabel");
  const grid  = document.getElementById("calGrid");

  const monthNames = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
  label.textContent = `${calYear}年${monthNames[calMonth]}`;

  // Build grid
  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(calYear, calMonth, 0).getDate();

  // Weekday headers (make it a grid with 7 cols)
  const headers = "日一二三四五六".split("");

  let html = headers.map(h => `<div class="cal-day-label">${h}</div>`).join("");

  // Previous month filler
  const startDay = firstDay;
  for (let i = 0; i < startDay; i++) {
    const d = daysInPrevMonth - startDay + i + 1;
    html += `<div class="cal-day cal-day--other cal-day--disabled">${d}</div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    let cls = "cal-day";
    if (calYear === todayYear && calMonth === todayMonth && d === todayDay) {
      cls += " cal-day--today";
    }
    // Disable past dates
    const cellDate = new Date(calYear, calMonth, d);
    const today = new Date(todayYear, todayMonth, todayDay);
    if (cellDate < today) {
      cls += " cal-day--disabled";
    }
    // Check if selected
    if (selectedDate && selectedDate.year === calYear && selectedDate.month === calMonth && selectedDate.day === d) {
      cls += " cal-day--selected";
    }
    const disabledAttr = cellDate < today ? "disabled" : "";
    html += `<button class="${cls}" onclick="pickDate(${calYear},${calMonth},${d})" ${disabledAttr}>${d}</button>`;
  }

  // Next month filler
  const totalCells = startDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="cal-day cal-day--other cal-day--disabled">${d}</div>`;
  }

  grid.innerHTML = html;
}

function pickDate(year, month, day) {
  const cellDate = new Date(year, month, day);
  const today = new Date(todayYear, todayMonth, todayDay);
  if (cellDate < today) return;

  selectedDate = { year, month, day, label: `${year}年${month+1}月${day}日` };
  document.getElementById("selectedDateDisplay").textContent = `已选：${selectedDate.label}`;
  document.getElementById("btnDateNext").disabled = false;
  renderCalendar();
}


// ╔══════════════════════════════════════════╗
// ║  FOOD GRID                             ║
// ╚══════════════════════════════════════════╝
function renderFoodGrid() {
  const grid = document.getElementById("foodGrid");
  grid.innerHTML = foods.map(f => {
    const sel = selectedFood === f.label ? "food-btn--selected" : "";
    return `<button class="food-btn ${sel}" onclick="pickFood('${f.label}')">
      <span class="food-emoji">${f.emoji}</span>${f.label}
    </button>`;
  }).join("");
}

function pickFood(label) {
  selectedFood = label;
  renderFoodGrid();
}


// ╔══════════════════════════════════════════╗
// ║  SUBMIT                                ║
// ╚══════════════════════════════════════════╝
async function handleSubmit() {
  const note = document.getElementById("noteInput").value.trim();
  const dateLabel = selectedDate ? selectedDate.label : "未选日期";
  const foodLabel = selectedFood || "未选食物";

  const btn = document.getElementById("btnSubmit");
  btn.textContent = "发送中…";
  btn.disabled = true;

  try {
    await Promise.race([
      notifyAll(dateLabel, foodLabel, note).catch(e => null),
      new Promise(r => setTimeout(r, 3000)) // max 3s timeout
    ]);
  } catch (_) { /* ignore — we show confirmation regardless */ }

  // Show confirmation — no auto-popups, no tricks
  showConfetti(dateLabel, foodLabel, note);
}

async function notifyAll(dateLabel, foodLabel, note) {
  // Fire-and-forget both
  const jobs = [];
  if (SCKEY && SCKEY !== "__SCKEY__") jobs.push(notifyWeChat(dateLabel, foodLabel, note));
  if (EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== "__EMAILJS_PUBLIC_KEY__") {
    jobs.push(notifyEmail(dateLabel, foodLabel, note));
  }
  if (jobs.length > 0) await Promise.allSettled(jobs);
}

async function notifyWeChat(dateLabel, foodLabel, note) {
  const text = `${MY_NAME}，她回复了！\n\n📅 ${dateLabel}\n🍖 ${foodLabel}${note ? '\n💬 '+note : ''}\n\n—— Dating Page`;
  // Image beacon: the only cross-origin method that works from file://
  new Image().src = `https://sctapi.ftqq.com/${SCKEY}.send?title=${encodeURIComponent("💘 她回复了")}&desp=${encodeURIComponent(text)}`;
  return true;
}

async function notifyEmail(dateLabel, foodLabel, note) {
  try {
    // EmailJS client-side SDK (loaded via CDN in head)
    const resp = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id: EMAILJS_SERVICE_ID,
        template_id: EMAILJS_TEMPLATE_ID,
        user_id: EMAILJS_PUBLIC_KEY,
        template_params: {
          date: dateLabel,
          food: foodLabel,
          note: note || "（无备注）",
          to_name: MY_NAME
        }
      })
    });
    console.log("Email notify:", resp.status);
    return resp.ok;
  } catch (e) {
    console.warn("Email failed:", e);
    return false;
  }
}


// ╔══════════════════════════════════════════╗
// ║  CONFIRMATION / CONFETTI               ║
// ╚══════════════════════════════════════════╝
function showConfetti(dateLabel, foodLabel, note) {
  // Remove all pages, show a fullscreen overlay
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById("dots").style.display = "none";

  const overlay = document.createElement("div");
  overlay.style.cssText = `
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;
    background:linear-gradient(180deg,#fff5f7,#ffd6e0);
    z-index:10;
  `;
  overlay.innerHTML = `
    <div style="font-size:64px;margin-bottom:16px;">💌</div>
    <h1 style="color:#e8577a;font-size:28px;">收到啦！</h1>
    <p style="margin:12px 0;font-size:16px;line-height:1.8;color:#555;">
      📅 ${dateLabel}<br>
      🍴 ${foodLabel || "什么都行"}${note ? '<br>💬 '+note : ''}
    </p>
    <p style="font-size:14px;color:#999;margin-top:24px;">
      他已经知道啦，<br>等他的消息吧 ✨
    </p>
  `;
  document.getElementById("app").appendChild(overlay);
}


// ╔══════════════════════════════════════════╗
// ║  EASTER EGG: "不要" button             ║
// ╚══════════════════════════════════════════╝
function handleNo() {
  const btn = document.querySelector(".btn--no");
  if (isDesktopPointer()) {
    moveNoButton(btn);
    showNoCopy();
    return;
  }
  btn.textContent = randomMobileNoCopy();
  setTimeout(() => { btn.textContent = "不要 💡"; }, 1000);
}

const noCopies = [
  "不可以点这里，系统会自动撒娇。",
  "这颗按钮今天请假了。",
  "再靠近一点，它就要逃去买花了。",
  "拒绝失败，请重新选择愿意。",
  "检测到犹豫：已为你加一点心动。",
  "不要按钮正在全屏躲猫猫。",
  "这个选项暂时被月老拦截。",
  "手滑也算愿意，真的。",
  "给个机会嘛，网页都写好了。"
];
const mobileNoCopies = [
  "再想想嘛~",
  "真的吗？",
  "给个机会嘛",
  "拜托拜托",
  "别这样嘛"
];

function isDesktopPointer() {
  return window.matchMedia("(hover: hover) and (pointer: fine)").matches;
}

let lastNoCopy = "";
let noCopyQueue = [];

function randomNoCopy() {
  if (noCopyQueue.length === 0) {
    noCopyQueue = [...noCopies];
    for (let i = noCopyQueue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [noCopyQueue[i], noCopyQueue[j]] = [noCopyQueue[j], noCopyQueue[i]];
    }
    if (noCopyQueue.length > 1 && noCopyQueue[0] === lastNoCopy) {
      [noCopyQueue[0], noCopyQueue[1]] = [noCopyQueue[1], noCopyQueue[0]];
    }
  }
  const next = noCopyQueue.shift();
  lastNoCopy = next;
  return next;
}

function randomMobileNoCopy() {
  return mobileNoCopies[Math.floor(Math.random() * mobileNoCopies.length)];
}

function showNoCopy() {
  let copy = document.getElementById("noCopy");
  if (!copy) {
    copy = document.createElement("div");
    copy.id = "noCopy";
    copy.className = "no-copy";
    document.body.appendChild(copy);
  }
  copy.textContent = randomNoCopy();
  copy.classList.add("no-copy--show");
  clearTimeout(showNoCopy.timer);
  showNoCopy.timer = setTimeout(() => copy.classList.remove("no-copy--show"), 1600);
}

let noButtonHome = null;
let noButtonNextSibling = null;
let noButtonEscapeLocked = false;

function moveNoButton(btn) {
  mountNoButtonToBody(btn);
  btn.classList.add("is-running-away");
  const gap = 24;
  const rect = btn.getBoundingClientRect();
  const width = Math.max(rect.width, 138);
  const height = Math.max(rect.height, 52);
  const maxLeft = Math.max(gap, window.innerWidth - width - gap);
  const maxTop = Math.max(gap, window.innerHeight - height - gap);
  btn.style.left = `${gap + Math.random() * (maxLeft - gap)}px`;
  btn.style.top = `${gap + Math.random() * (maxTop - gap)}px`;
  btn.classList.remove("is-flashing");
  void btn.offsetWidth;
  btn.classList.add("is-flashing");
}

function mountNoButtonToBody(btn) {
  if (!noButtonHome) {
    noButtonHome = btn.parentElement;
    noButtonNextSibling = btn.nextSibling;
  }
  if (btn.parentElement !== document.body) {
    document.body.appendChild(btn);
  }
}

function restoreNoButtonHome(btn) {
  if (!btn || !noButtonHome) return;
  btn.classList.remove("is-running-away", "is-flashing");
  btn.style.left = "";
  btn.style.top = "";
  if (btn.parentElement !== noButtonHome) {
    noButtonHome.insertBefore(btn, noButtonNextSibling);
  }
}

function initNoButtonEscape() {
  const btn = document.querySelector(".btn--no");
  if (!btn) return;
  const escape = () => {
    if (!isDesktopPointer() || noButtonEscapeLocked) return;
    noButtonEscapeLocked = true;
    moveNoButton(btn);
    showNoCopy();
    setTimeout(() => { noButtonEscapeLocked = false; }, 260);
  };
  btn.addEventListener("mouseenter", escape);
  btn.addEventListener("pointermove", (event) => {
    if (event.pointerType === "mouse") escape();
  });
  window.addEventListener("resize", () => {
    if (currentPage === 0 && isDesktopPointer() && btn.classList.contains("is-running-away")) {
      moveNoButton(btn);
    }
  });
}


// ╔══════════════════════════════════════════╗
// ║  INIT                                  ║
// ╚══════════════════════════════════════════╝
// Render initial calendar
renderCalendar();
initNoButtonEscape();
</script>
